<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manfaat VR</title>
    <!-- Import A-Frame library -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    
    <!-- Script untuk Tombol Tutup & Animasi Partikel -->
    <script>
      AFRAME.registerComponent('close-tab', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Animasi tombol saat diklik
            this.el.setAttribute('animation__click', 'property: scale; to: 0.95 0.95 0.95; dur: 150');
            
            setTimeout(() => {
              // Tutup tab
              window.close();
              
              // Fallback
              setTimeout(() => {
                window.location.href = 'presentasi.html';
              }, 150);
            }, 150);
          });
        }
      });

      // Komponen partikel mengambang untuk aksen bercahaya
      AFRAME.registerComponent('floating-particles', {
        init: function () {
          for (let i = 0; i < 40; i++) {
            let sphere = document.createElement('a-sphere');
            let x = (Math.random() - 0.5) * 30;
            let y = Math.random() * 8 + 0.5;
            let z = (Math.random() - 0.5) * 15 - 3;
            sphere.setAttribute('position', `${x} ${y} ${z}`);
            sphere.setAttribute('radius', Math.random() * 0.04 + 0.01);
            
            // Randomly assign teal or cyan colors to particles
            let isTeal = Math.random() > 0.5;
            let color = isTeal ? '#0ea5e9' : '#10b981';
            
            sphere.setAttribute('material', `color: ${color}; transparent: true; opacity: 0.5; shader: flat`);
            
            let dur = Math.random() * 4000 + 3000;
            let toY = y + (Math.random() * 1.5 + 0.5);
            sphere.setAttribute('animation', `property: position; to: ${x} ${toY} ${z}; dur: ${dur}; dir: alternate; loop: true; easing: easeInOutSine`);
            
            this.el.appendChild(sphere);
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- Camera -->
      <a-entity camera look-controls position="0 1.6 0">
        <a-entity cursor="fuse: true; fuseTimeout: 2000"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.018"
                  material="color: #38BDF8; shader: flat; opacity: 0.8"
                  raycaster="objects: .clickable"
                  animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2000; from: 1 1 1; to: 0.1 0.1 0.1"
                  animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 300; to: 1 1 1"
                  animation__click="property: scale; startEvents: click; easing: easeOutCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
        </a-entity>
      </a-entity>

      <!-- Lingkungan: Teal-Black & Green-Tinted Ground -->
      <a-sky color="#020b12"></a-sky>
      <a-plane color="#071a10" rotation="-90 0 0" width="100" height="100"></a-plane>
      
      <!-- Floating Particles (Aksen Bercahaya) -->
      <a-entity floating-particles></a-entity>

      <!-- Header -->
      <a-text value="MANFAAT VR" font="kelsonsans" align="center" position="0 4.8 -5" color="#FFFFFF" scale="2.5 2.5 2.5" letterSpacing="3"></a-text>

      <!-- 5 BENEFIT CARDS (Baris 1 dan Baris 2) -->
      
      <!-- Baris 1: Kartu 1 -->
      <a-entity position="-3 2.8 -5" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0a2218" width="2.5" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.54" height="1.44" position="0 0 -0.01" opacity="0.4"></a-plane>
          
          <a-text value="01" font="kelsonsans" align="left" position="-1.1 0.45 0.02" color="#0EA5E9" scale="1.8 1.8 1.8" opacity="0.8"></a-text>
          <a-text value="Pengalaman Belajar\nInteraktif" font="kelsonsans" align="left" position="-0.5 0.4 0.02" color="#FFFFFF" scale="1.1 1.1 1.1"></a-text>
          <a-text value="Memberikan pengalaman belajar yang lebih menarik dan mudah diingat dibanding metode konvensional." font="kelsonsans" align="left" position="-1.1 -0.15 0.02" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="32"></a-text>
        </a-plane>
      </a-entity>

      <!-- Baris 1: Kartu 2 -->
      <a-entity position="0 2.8 -5" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0a1828" width="2.5" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.54" height="1.44" position="0 0 -0.01" opacity="0.4"></a-plane>
          
          <a-text value="02" font="kelsonsans" align="left" position="-1.1 0.45 0.02" color="#0EA5E9" scale="1.8 1.8 1.8" opacity="0.8"></a-text>
          <a-text value="Simulasi Tanpa\nRisiko" font="kelsonsans" align="left" position="-0.5 0.4 0.02" color="#FFFFFF" scale="1.1 1.1 1.1"></a-text>
          <a-text value="Membantu melatih prosedur berbahaya tanpa risiko nyata bagi pengguna." font="kelsonsans" align="left" position="-1.1 -0.15 0.02" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="32"></a-text>
        </a-plane>
      </a-entity>

      <!-- Baris 1: Kartu 3 -->
      <a-entity position="3 2.8 -5" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0a2218" width="2.5" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.54" height="1.44" position="0 0 -0.01" opacity="0.4"></a-plane>
          
          <a-text value="03" font="kelsonsans" align="left" position="-1.1 0.45 0.02" color="#0EA5E9" scale="1.8 1.8 1.8" opacity="0.8"></a-text>
          <a-text value="Media Promosi\nMenarik" font="kelsonsans" align="left" position="-0.5 0.4 0.02" color="#FFFFFF" scale="1.1 1.1 1.1"></a-text>
          <a-text value="Meningkatkan daya tarik presentasi, pameran, dan media promosi secara signifikan." font="kelsonsans" align="left" position="-1.1 -0.15 0.02" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="32"></a-text>
        </a-plane>
      </a-entity>

      <!-- Baris 2: Kartu 4 -->
      <a-entity position="-1.5 1.1 -5" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0a1828" width="2.5" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.54" height="1.44" position="0 0 -0.01" opacity="0.4"></a-plane>
          
          <a-text value="04" font="kelsonsans" align="left" position="-1.1 0.45 0.02" color="#0EA5E9" scale="1.8 1.8 1.8" opacity="0.8"></a-text>
          <a-text value="Visualisasi\nVirtual" font="kelsonsans" align="left" position="-0.5 0.4 0.02" color="#FFFFFF" scale="1.1 1.1 1.1"></a-text>
          <a-text value="Mempermudah visualisasi tempat atau objek yang sulit dijangkau secara fisik." font="kelsonsans" align="left" position="-1.1 -0.15 0.02" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="32"></a-text>
        </a-plane>
      </a-entity>

      <!-- Baris 2: Kartu 5 -->
      <a-entity position="1.5 1.1 -5" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0a2218" width="2.5" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.54" height="1.44" position="0 0 -0.01" opacity="0.4"></a-plane>
          
          <a-text value="05" font="kelsonsans" align="left" position="-1.1 0.45 0.02" color="#0EA5E9" scale="1.8 1.8 1.8" opacity="0.8"></a-text>
          <a-text value="Industri Kreatif\n& Teknologi" font="kelsonsans" align="left" position="-0.5 0.4 0.02" color="#FFFFFF" scale="1.1 1.1 1.1"></a-text>
          <a-text value="Mendukung pengembangan dan inovasi di sektor industri kreatif dan teknologi." font="kelsonsans" align="left" position="-1.1 -0.15 0.02" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="32"></a-text>
        </a-plane>
      </a-entity>

      <!-- Tombol Kembali / Tutup -->
      <a-entity position="0 -0.1 -4.5">
        <a-plane class="clickable" color="#1E293B" width="2" height="0.5" close-tab
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.03" height="0.53" position="0 0 -0.01"></a-plane>
          <a-text value="Kembali / Tutup" font="kelsonsans" align="center" position="0 0 0.02" color="#FFFFFF" scale="1.1 1.1 1.1"></a-text>
        </a-plane>
      </a-entity>

    </a-scene>
  </body>
</html>
