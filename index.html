<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobby - Workshop VR</title>
    <!-- Import A-Frame library (Updated to 1.7.1) -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- Import A-Frame Environment Component -->
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    
    <script>
      // Detect low-end / mobile device
      window.isLowEndDevice = AFRAME.utils.device.isMobile() || 
                             (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
                             /perf=low/i.test(window.location.search);

      AFRAME.registerComponent('low-end-optimize', {
        init: function () {
          var sceneEl = this.el;
          var isLow = window.isLowEndDevice;
          var maxRatio = isLow ? 1.5 : 2.0; // Bumped graphics ratio on mobile
          
          sceneEl.setAttribute('renderer', {
            antialias: true, // Keep antialiasing enabled for smooth edges
            precision: 'medium',
            powerPreference: 'high-performance',
            logarithmicDepthBuffer: false
          });

          var applyPixelRatio = () => {
            if (sceneEl.renderer) {
              sceneEl.renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxRatio));
            }
          };
          if (sceneEl.renderer) { applyPixelRatio(); }
          else { sceneEl.addEventListener('render-target-loaded', applyPixelRatio); }
        }
      });

      AFRAME.registerComponent('wireframe-hills', {
        init: function () {
          var isLow = window.isLowEndDevice;
          var segments = isLow ? 60 : 100; // Smoother geometry on mobile
          // Larger, more visible wireframe hills
          var geometry = new THREE.PlaneGeometry(200, 200, segments, segments);
          var position = geometry.attributes.position;
          for (var i = 0; i < position.count; i++) {
            var x = position.getX(i);
            var y = position.getY(i);
            var z = (Math.sin(x * 0.2) + Math.cos(y * 0.2)) * 1.5;
            position.setZ(i, z);
          }
          geometry.computeVertexNormals();
          
          var canvas = document.createElement('canvas');
          canvas.width = 128;
          canvas.height = 128;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, 128, 128);
          ctx.strokeStyle = '#0EA5E9';
          ctx.lineWidth = 6;
          ctx.strokeRect(0, 0, 128, 128);
          
          var texture = new THREE.CanvasTexture(canvas);
          texture.wrapS = THREE.RepeatWrapping;
          texture.wrapT = THREE.RepeatWrapping;
          texture.repeat.set(segments, segments);

          var material = new THREE.MeshBasicMaterial({ map: texture });
          var mesh = new THREE.Mesh(geometry, material);
          mesh.rotation.x = -Math.PI / 2;
          mesh.position.y = -2;
          this.el.setObject3D('mesh', mesh);
        }
      });

      AFRAME.registerComponent('floating-particles', {
        init: function () {
          var isLow = window.isLowEndDevice;
          var count = isLow ? 10 : 15; // More particles on mobile
          for (let i = 0; i < count; i++) {
            let sphere = document.createElement('a-sphere');
            sphere.setAttribute('id', 'idx-lobby-particle-' + i);
            let x = (Math.random() - 0.5) * 40;
            let y = Math.random() * 10 + 0.5;
            let z = (Math.random() - 0.5) * 40 - 5;
            
            sphere.setAttribute('position', `${x} ${y} ${z}`);
            sphere.setAttribute('radius', Math.random() * 0.04 + 0.01);
            sphere.setAttribute('material', 'color: #38BDF8; transparent: true; opacity: 0.6; shader: flat');
            
            let dur = Math.random() * 3000 + 3000;
            let toY = y + (Math.random() * 1.5 + 0.5);
            sphere.setAttribute('animation', `property: position; to: ${x} ${toY} ${z}; dur: ${dur}; dir: alternate; loop: true; easing: easeInOutSine`);
            
            this.el.appendChild(sphere);
          }
        }
      });

      AFRAME.registerComponent('start-tour', {
        init: function () {
          this.el.addEventListener('click', () => {
            localStorage.removeItem('vr_visited_step'); // Reset tour progress
            // Animasi transisi ringan
            this.el.setAttribute('animation__click', 'property: scale; to: 0.95 0.95 0.95; dur: 150');
            setTimeout(() => {
              window.location.href = 'presentasi.html';
            }, 200);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene renderer="antialias: false; precision: medium; powerPreference: high-performance" low-end-optimize id="idx-lobby-scene" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- Camera -->
      <a-entity id="idx-lobby-camera" camera look-controls position="0 1.6 0">
        <!-- Thin cyan ring cursor -->
        <a-entity id="idx-lobby-cursor" cursor="fuse: true; fuseTimeout: 2000"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.018"
                  material="color: #38BDF8; shader: flat; opacity: 0.8"
                  raycaster="objects: .clickable"
                  animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2000; from: 1 1 1; to: 0.1 0.1 0.1"
                  animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 300; to: 1 1 1"
                  animation__click="property: scale; startEvents: click; easing: easeOutCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
        </a-entity>
      </a-entity>

      <!-- Background sky color (very dark navy) -->
      <a-sky id="idx-lobby-sky" color="#000511"></a-sky>

      <!-- Lantai Wireframe Bukit Kustom -->
      <a-entity id="idx-wireframe-hills-entity" wireframe-hills></a-entity>

      <!-- Floating Particles -->
      <a-entity id="idx-floating-particles-system" floating-particles></a-entity>

      <!-- Dekorasi Globe Wireframe yang Mengorbit (Circling Around) -->
      
      <!-- Globe 1: Medium, Orbit Lambat -->
      <a-entity id="idx-globe1-orbit" position="0 1.6 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear">
        <a-sphere id="idx-globe1-sphere" position="4.5 1 -4.5" radius="1.2" segments-width="18" segments-height="18"
                  material="color: #0EA5E9; wireframe: true; transparent: true; opacity: 0.6"
                  animation="property: rotation; to: 360 360 0; loop: true; dur: 12000; easing: linear">
        </a-sphere>
      </a-entity>

      <!-- Globe 2: Besar, Jauh, Orbit Sangat Lambat, Berlawanan Arah -->
      <a-entity id="idx-globe2-orbit" position="0 1.6 0" animation="property: rotation; to: 0 -360 0; loop: true; dur: 40000; easing: linear">
        <a-sphere id="idx-globe2-sphere" position="-8 3 -6" radius="2.5" segments-width="24" segments-height="24"
                  material="color: #38BDF8; wireframe: true; transparent: true; opacity: 0.3"
                  animation="property: rotation; to: 360 -360 0; loop: true; dur: 20000; easing: linear">
        </a-sphere>
      </a-entity>

      <!-- Globe 3: Kecil, Dekat, Orbit Cepat -->
      <a-entity id="idx-globe3-orbit" position="0 1.6 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
        <a-sphere id="idx-globe3-sphere" position="2.5 -0.5 -2" radius="0.4" segments-width="12" segments-height="12"
                  material="color: #BAE6FD; wireframe: true; transparent: true; opacity: 0.8"
                  animation="property: rotation; to: -360 360 0; loop: true; dur: 5000; easing: linear">
        </a-sphere>
      </a-entity>

      <!-- Panel Selamat Datang -->
      <a-entity id="idx-welcome-panel" rotation="13.355073246704357 0 0" position="0 2.89326 -3.4897">
        <!-- Panel Latar Belakang Minimalis -->
        <a-plane id="idx-welcome-bg" color="#000000" width="5" height="1.8" opacity="0.4" material="transparent: true"></a-plane>

        <a-text id="idx-welcome-title" value="WORKSHOP VIRTUAL REALITY" font="kelsonsans" align="center" position="0 0.3 0.05" color="#F8FAFC" scale="1.4 1.4 1.4" letterSpacing="2"></a-text>
        <!-- The subtitle you mentioned: -->
        <a-text id="idx-welcome-subtitle" value="Jelajahi dunia alternatif yang menghubungkan imajinasi dan realita" font="kelsonsans" align="center" position="0 -0.27446 0.05" color="#94A3B8" scale="0.9 0.9 0.9" animation="property: opacity; from: 0.6; to: 1.0; dur: 2000; dir: alternate; loop: true"></a-text>
      </a-entity>

      <!-- Tombol Mulai Minimalis (with pulse animation) -->
      <a-entity id="idx-start-btn-wrapper" position="0 0.75 -4.08">
        <a-plane id="idx-start-btn" class="clickable" color="#0EA5E9" width="1.8" height="0.45" opacity="0.9"
                 start-tour=""
                 animation__pulse="property: scale; to: 1.03 1.03 1.03; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine"
                 animation__mouseenter="property: color; to: #38BDF8; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: color; to: #0EA5E9; startEvents: mouseleave; dur: 200">
          <a-text id="idx-start-btn-text" value="MULAI" font="kelsonsans" align="center" position="0 0 0.05" color="#FFFFFF" scale="1.1 1.1 1.1" letterSpacing="3"></a-text>
        </a-plane>
      </a-entity>

    </a-scene>
  </body>
</html>
