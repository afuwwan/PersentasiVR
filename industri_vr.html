<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR & Industri 4.0</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    <style>
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: 10000;
        background: rgba(2, 6, 15, 0.9);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        justify-content: center;
        align-items: center;
        flex-direction: column;
        animation: fadeIn 0.3s ease-out;
      }
      .modal-content {
        width: 85%; max-width: 820px;
        background: #030812;
        border: 1.5px solid #0ea5e9;
        border-radius: 14px;
        box-shadow: 0 0 40px rgba(14,165,233,0.35);
        overflow: hidden;
        transform: scale(0.88);
        animation: scaleUp 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
      }
      .video-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0; overflow: hidden;
      }
      .video-container iframe {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        border: none;
      }
      .close-button {
        margin-top: 22px;
        padding: 11px 34px;
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: #fff; border: none; border-radius: 28px;
        font-family: 'Segoe UI', Roboto, sans-serif;
        font-size: 15px; font-weight: 700; letter-spacing: 1px;
        cursor: pointer;
        box-shadow: 0 6px 18px rgba(14,165,233,0.3);
        transition: all 0.3s ease;
      }
      .close-button:hover {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        transform: translateY(-2px);
        box-shadow: 0 10px 22px rgba(14,165,233,0.5);
      }
      @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
      @keyframes scaleUp { to { transform: scale(1) } }
    </style>

    <script>
      // Detect low-end / mobile device
      window.isLowEndDevice = AFRAME.utils.device.isMobile() || 
                             (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
                             /perf=low/i.test(window.location.search);

      AFRAME.registerComponent('low-end-optimize', {
        init: function () {
          var sceneEl = this.el;
          var isLow = window.isLowEndDevice;
          var maxRatio = isLow ? 1.5 : 2.0; // Bumped graphics ratio on mobile
          
          sceneEl.setAttribute('renderer', {
            antialias: true, // Keep antialiasing enabled for smooth edges
            precision: 'medium',
            powerPreference: 'high-performance',
            logarithmicDepthBuffer: false
          });

          var applyPixelRatio = () => {
            if (sceneEl.renderer) {
              sceneEl.renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxRatio));
            }
          };
          if (sceneEl.renderer) { applyPixelRatio(); }
          else { sceneEl.addEventListener('render-target-loaded', applyPixelRatio); }
        }
      });

      // Back navigation
      AFRAME.registerComponent('close-tab', {
        init: function () {
          this.el.addEventListener('click', () => {
            this.el.setAttribute('animation__click', 'property: scale; to: 0.95 0.95 0.95; dur: 150');
            setTimeout(() => { window.location.href = 'presentasi.html'; }, 150);
          });
        }
      });

      // Ambient floating particles
      AFRAME.registerComponent('floating-particles', {
        init: function () {
          var isLow = window.isLowEndDevice;
          var count = isLow ? 10 : 18; // More particles on mobile
          const colors = ['#0EA5E9', '#38BDF8', '#7DD3FC', '#0D9488', '#2DD4BF'];
          for (let i = 0; i < count; i++) {
            let s = document.createElement('a-sphere');
            let x = (Math.random() - 0.5) * 35;
            let y = Math.random() * 9 + 0.5;
            let z = (Math.random() - 0.5) * 20 - 3;
            s.setAttribute('position', `${x} ${y} ${z}`);
            s.setAttribute('radius', Math.random() * 0.025 + 0.01);
            let c = colors[Math.floor(Math.random() * colors.length)];
            s.setAttribute('material', `color: ${c}; transparent: true; opacity: 0.32; shader: flat`);
            let dur = Math.random() * 4000 + 3000;
            let toY = y + Math.random() * 1.5 + 0.5;
            s.setAttribute('animation', `property: position; to: ${x} ${toY} ${z}; dur: ${dur}; dir: alternate; loop: true; easing: easeInOutSine`);
            this.el.appendChild(s);
          }
        }
      });

      // Open YouTube video modal (or new tab in VR mode)
      AFRAME.registerComponent('play-video', {
        init: function () {
          this.el.addEventListener('click', () => {
            this.el.setAttribute('animation__click', 'property: scale; to: 0.95 0.95 0.95; dur: 150');
            setTimeout(() => { this.el.setAttribute('animation__click', 'property: scale; to: 1 1 1; dur: 150'); }, 150);
            if (this.el.sceneEl.is('vr-mode')) {
              window.open('https://www.youtube.com/watch?v=GZHTrD3tMDM', '_blank');
            } else {
              document.getElementById('ind-video-iframe').src = 'https://www.youtube.com/embed/GZHTrD3tMDM?autoplay=1';
              document.getElementById('ind-video-modal').style.display = 'flex';
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene renderer="antialias: false; precision: medium; powerPreference: high-performance" low-end-optimize id="ind-main-scene" cursor="rayOrigin: mouse" raycaster="objects: .clickable">

      <a-assets>
        <img id="ind-yt-thumb" src="img/industri_yt_thumb.jpg">
      </a-assets>

      <!-- Camera: look + WASD walk -->
      <a-entity id="ind-main-camera" camera look-controls wasd-controls="acceleration: 15" position="0 1.6 0">
        <a-entity id="ind-camera-cursor" cursor="fuse: true; fuseTimeout: 2000"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.018"
                  material="color: #0EA5E9; shader: flat; opacity: 0.8"
                  raycaster="objects: .clickable"
                  animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2000; from: 1 1 1; to: 0.1 0.1 0.1"
                  animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 300; to: 1 1 1"
                  animation__click="property: scale; startEvents: click; easing: easeOutCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
        </a-entity>
      </a-entity>

      <!-- Environment -->
      <a-sky id="ind-env-sky" color="#040a18"></a-sky>
      <a-plane id="ind-env-ground" color="#01030a" rotation="-90 0 0" width="100" height="100" material="shader: flat"></a-plane>
      <a-plane id="ind-env-grid" position="0 0.01 0" rotation="-90 0 0" width="100" height="100"
               material="color: #1e293b; wireframe: true; transparent: true; opacity: 0.18; shader: flat"></a-plane>

      <!-- Ambient particles -->
      <a-entity id="ind-particles-system" floating-particles></a-entity>

      <!-- Background rings -->
      <a-entity id="ind-bg-rings" position="0 3 -8"
                animation="property: rotation; to: 360 360 0; loop: true; dur: 48000; easing: linear">
        <a-torus id="ind-bg-ring-1" radius="7" radius-tubular="0.012"
                 material="color: #0EA5E9; opacity: 0.10; transparent: true; shader: flat"></a-torus>
        <a-torus id="ind-bg-ring-2" radius="7.6" radius-tubular="0.008" rotation="90 0 0"
                 material="color: #0D9488; opacity: 0.07; transparent: true; shader: flat"
                 animation="property: rotation; to: 90 360 0; loop: true; dur: 30000; easing: linear"></a-torus>
      </a-entity>

      <!-- Page title (floating, gentle bob) -->
      <a-text id="ind-page-title" rotation="16 0 0" value="VR & INDUSTRI 4.0" font="kelsonsans" align="center"
              position="0 4.9 -5" color="#FFFFFF" scale="2.1 2.1 2.1" letterSpacing="3"
              animation="property: position; to: 0 4.8 -5; dur: 3400; dir: alternate; loop: true; easing: easeInOutSine">
      </a-text>
      <a-text id="ind-page-subtitle" value="Peran VR dalam Revolusi Industri 4.0 — Putar kepala untuk menjelajahi" font="kelsonsans"
              align="center" position="0 4.57 -6.1" color="#0EA5E9" scale="0.8 0.8 0.8">
      </a-text>

      <!-- ============================================================
           PANEL 1: Pelatihan Aman  (Far Left)   Accent: #0EA5E9 cyan
           ============================================================ -->
      <a-entity id="ind-panel1-wrapper" position="-5.46571 2.2 -2.93888" rotation="0 55 0"
                animation="property: scale; from: 0.8 0.8 0.8; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane id="ind-panel1-bg" scale="1.17 1 1" width="3.2" height="2.2" color="#040D1A"
                 material="transparent: true; opacity: 0.93; shader: flat"></a-plane>
        <a-plane id="ind-panel1-border" scale="1.165 1 1" width="3.24" height="2.24" color="#0EA5E9" position="0 0 -0.008"
                 material="shader: flat; transparent: true; opacity: 0.6"></a-plane>

        <!-- Ghost number watermark -->
        <a-text id="ind-panel1-num" value="01" font="kelsonsans" align="left"
                position="-1.79 0.76 0.02" color="#0EA5E9" scale="2.8 2.8 2.8" opacity="0.18"></a-text>
        <!-- Title -->
        <a-text id="ind-panel1-title" value="Pelatihan Aman" font="kelsonsans" align="left"
                position="-0.8 0.75 0.02" color="#FFFFFF" scale="1.5 1.5 1.5"></a-text>
        <!-- Divider -->
        <a-box id="ind-panel1-divider" scale="1.26 1 1" position="0 0.33 0.02" width="2.9" height="0.006" depth="0.001"
               color="#0EA5E9" material="shader: flat; opacity: 0.5"></a-box>
        <!-- Description -->
        <a-text id="ind-panel1-desc"
                value="Simulasi pekerjaan berisiko tinggi tanpa bahaya nyata. Pekerja bisa berlatih prosedur berbahaya berkali-kali dalam lingkungan digital yang aman."
                font="kelsonsans" align="left" position="-1.49 -0.35 0.02" color="#CBD5E1"
                scale="0.72 0.72 0.72" width="4.8"></a-text>
      </a-entity>

      <!-- ============================================================
           PANEL 2: Efisiensi Biaya  (Left)   Accent: #34D399 emerald
           ============================================================ -->
      <a-entity id="ind-panel2-wrapper" position="-2.15404 2.2 -4.7" rotation="0 0.6044704738630186 0"
                animation="property: scale; from: 0.8 0.8 0.8; to: 1 1 1; dur: 700; easing: easeOutBack">
        <a-plane id="ind-panel2-bg" scale="1.27 1 1" width="3.2" height="2.2" color="#04120A"
                 material="transparent: true; opacity: 0.93; shader: flat"></a-plane>
        <a-plane id="ind-panel2-border" scale="1.265 1 1" width="3.24" height="2.24" color="#34D399" position="0 0 -0.008"
                 material="shader: flat; transparent: true; opacity: 0.6"></a-plane>

        <a-text id="ind-panel2-num" value="02" font="kelsonsans" align="left"
                position="-1.87 0.76 0.02" color="#34D399" scale="2.8 2.8 2.8" opacity="0.18"></a-text>
        <a-text id="ind-panel2-title" value="Efisiensi Biaya" font="kelsonsans" align="left"
                position="-0.86 0.8 0.02" color="#FFFFFF" scale="1.5 1.5 1.5"></a-text>
        <a-box id="ind-panel2-divider" scale="1.38 1 1" position="0 0.37 0.02" width="2.9" height="0.006" depth="0.001"
               color="#34D399" material="shader: flat; opacity: 0.5"></a-box>
        <a-text id="ind-panel2-desc"
                value="Mengurangi biaya pengadaan alat fisik dan fasilitas pelatihan nyata. VR memungkinkan simulasi berulang dengan biaya marginal yang jauh lebih rendah."
                font="kelsonsans" align="left" position="-1.41 -0.38 0.02" color="#CBD5E1"
                scale="0.72 0.72 0.72" width="4.8"></a-text>
      </a-entity>

      <!-- ============================================================
           PANEL 3: Visualisasi 3D  (Right)   Accent: #A78BFA purple
           ============================================================ -->
      <a-entity id="ind-panel3-wrapper" position="2.18283 2.2 -4.72985" rotation="0 0.4801386323196299 0"
                animation="property: scale; from: 0.8 0.8 0.8; to: 1 1 1; dur: 800; easing: easeOutBack">
        <a-plane id="ind-panel3-bg" scale="1.25 1 1" width="3.2" height="2.2" color="#08060E"
                 material="transparent: true; opacity: 0.93; shader: flat"></a-plane>
        <a-plane id="ind-panel3-border" scale="1.245 1 1" width="3.24" height="2.24" color="#A78BFA" position="0 0 -0.008"
                 material="shader: flat; transparent: true; opacity: 0.6"></a-plane>

        <a-text id="ind-panel3-num" value="03" font="kelsonsans" align="left"
                position="-1.92 0.8 0.02" color="#A78BFA" scale="2.8 2.8 2.8" opacity="0.18"></a-text>
        <a-text id="ind-panel3-title" value="Visualisasi 3D" font="kelsonsans" align="left"
                position="-0.87 0.8 0.02" color="#FFFFFF" scale="1.5 1.5 1.5"></a-text>
        <a-box id="ind-panel3-divider" scale="1.32 1 1" position="0 0.32 0.02" width="2.9" height="0.006" depth="0.001"
               color="#A78BFA" material="shader: flat; opacity: 0.5"></a-box>
        <a-text id="ind-panel3-desc"
                value="Rekayasa dan manufaktur menggunakan VR untuk visualisasi desain 3D sebelum produksi. Engineer dapat mendeteksi masalah lebih awal secara interaktif."
                font="kelsonsans" align="left" position="-1.5 -0.4 0.02" color="#CBD5E1"
                scale="0.72 0.72 0.72" width="4.8"></a-text>
      </a-entity>

      <!-- ============================================================
           PANEL 4: Video Simulasi  (Far Right)  Accent: #FB923C orange
           ============================================================ -->
      <a-entity id="ind-panel4-wrapper" position="5.77 2.2 -2.98609" rotation="0 -55 0"
                animation="property: scale; from: 0.8 0.8 0.8; to: 1 1 1; dur: 900; easing: easeOutBack">
        <a-plane id="ind-panel4-bg" scale="1.27 1 1" width="3.2" height="2.2" color="#0E0804"
                 material="transparent: true; opacity: 0.93; shader: flat"></a-plane>
        <a-plane id="ind-panel4-border" scale="1.265 1 1" width="3.24" height="2.24" color="#FB923C" position="0 0 -0.008"
                 material="shader: flat; transparent: true; opacity: 0.6"></a-plane>

        <a-text id="ind-panel4-num" value="04" font="kelsonsans" align="left"
                position="-1.87 0.76 0.02" color="#FB923C" scale="2.8 2.8 2.8" opacity="0.18"></a-text>

        <!-- YouTube thumbnail (takes upper portion of panel) -->
        <a-image id="ind-panel4-thumb" src="#ind-yt-thumb" width="2.85" height="1.6" position="0 0.15 0.02"></a-image>

        <!-- Red play circle overlaid on thumbnail -->
        <a-circle id="ind-panel4-play-bg" radius="0.2" color="#DC2626"
                  material="shader: flat; opacity: 0.9" position="0 0.15 0.04"></a-circle>
        <a-cone id="ind-panel4-play-icon" radius-bottom="0.07" height="0.11"
                rotation="0 0 -90" position="0.025 0.15 0.05"
                color="#FFFFFF" material="shader: flat"></a-cone>

        <!-- Caption + click hint -->
        <a-text id="ind-panel4-caption" value="Video Simulasi VR 4.0" font="kelsonsans" align="left"
                position="-1.3 -0.71 0.02" color="#FFFFFF" scale="1.0 1.0 1.0"></a-text>
        <a-text id="ind-panel4-hint" value="Tatap untuk memutar" font="kelsonsans" align="left"
                position="-1.00839 -0.93 0.22418" color="#FB923C" scale="0.72 0.72 0.72"></a-text>

        <!-- Clickable hit area covering full panel -->
        <a-plane id="ind-panel4-click" class="clickable" width="3.2" height="2.2" play-video
                 material="transparent: true; opacity: 0"
                 animation__mouseenter="property: scale; to: 1.03 1.03 1.03; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
        </a-plane>
      </a-entity>

      <!-- ==================== BACK BUTTON ==================== -->
      <a-entity id="ind-btn-back" position="0 0.4 -4.47641" class="clickable" close-tab
                geometry="primitive: plane; width: 1.8; height: 0.45"
                material="transparent: true; opacity: 0"
                animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
        <a-plane id="ind-btn-back-bg" width="1.8" height="0.45" color="#04090E"
                 material="transparent: true; opacity: 0.88; shader: flat" position="0 0 -0.001"></a-plane>
        <a-plane id="ind-btn-back-border" width="1.82" height="0.47" color="#0EA5E9"
                 position="0 0 -0.005" material="shader: flat; transparent: true; opacity: 0.7"></a-plane>
        <a-text id="ind-btn-back-text" value="KEMBALI" color="#0EA5E9" scale="0.65 0.65 0.65"
                align="center" position="0 0 0.02" font="kelsonsans"></a-text>
      </a-entity>

    </a-scene>

    <!-- YouTube Video Modal -->
    <div id="ind-video-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="video-container">
          <iframe id="ind-video-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>
      <button id="ind-close-video-btn" class="close-button">TUTUP VIDEO</button>
    </div>

    <script>
      document.getElementById('ind-close-video-btn').addEventListener('click', function () {
        document.getElementById('ind-video-iframe').src = '';
        document.getElementById('ind-video-modal').style.display = 'none';
      });
    </script>
  </body>
</html>
