<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR & Industri 4.0</title>
    <!-- Import A-Frame library -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    
    <!-- Script untuk Tombol Tutup -->
    <script>
      AFRAME.registerComponent('close-tab', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Animasi tombol saat diklik
            this.el.setAttribute('animation__click', 'property: scale; to: 0.95 0.95 0.95; dur: 150');
            
            setTimeout(() => {
              // Tutup tab
              window.close();
              
              // Fallback
              setTimeout(() => {
                window.location.href = 'presentasi.html';
              }, 150);
            }, 150);
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <!-- Camera -->
      <a-entity camera look-controls position="0 1.6 0">
        <a-entity cursor="fuse: true; fuseTimeout: 2000"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.018"
                  material="color: #38BDF8; shader: flat; opacity: 0.8"
                  raycaster="objects: .clickable"
                  animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2000; from: 1 1 1; to: 0.1 0.1 0.1"
                  animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 300; to: 1 1 1"
                  animation__click="property: scale; startEvents: click; easing: easeOutCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
        </a-entity>
      </a-entity>

      <!-- Lingkungan: Industrial/Tech feel (Sky sangat gelap, lantai rata) -->
      <a-sky color="#030a14"></a-sky>
      <a-plane color="#0a0f1a" rotation="-90 0 0" width="100" height="100"></a-plane>
      
      <!-- Dekorasi Tambahan: Rotating Wireframe Torus di latar belakang -->
      <a-entity position="0 2.5 -8" animation="property: rotation; to: 360 360 0; loop: true; dur: 45000; easing: linear">
        <a-torus radius="6" radius-tubular="0.02" material="color: #0EA5E9; wireframe: true; opacity: 0.2; transparent: true"></a-torus>
        <a-torus radius="4.5" radius-tubular="0.03" rotation="90 0 0" material="color: #0EA5E9; wireframe: true; opacity: 0.15; transparent: true" animation="property: rotation; to: 90 360 0; loop: true; dur: 35000; easing: linear"></a-torus>
        <a-torus radius="3" radius-tubular="0.01" rotation="0 90 0" material="color: #0EA5E9; opacity: 0.1; transparent: true" animation="property: rotation; to: 0 90 360; loop: true; dur: 25000; easing: linear"></a-torus>
      </a-entity>

      <!-- MAIN PANEL BACKGROUND -->
      <a-entity position="0 2.5 -5" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0a1628" width="6.5" height="4" opacity="0.9">
          <!-- Thin cyan border for the main panel -->
          <a-plane color="#0EA5E9" width="6.54" height="4.04" position="0 0 -0.01" opacity="0.5"></a-plane>
        </a-plane>

        <!-- Decorative Glowing Accent Line (di atas Judul) -->
        <a-plane position="0 1.55 0.01" width="3" height="0.02" color="#0EA5E9" opacity="0.8"></a-plane>

        <!-- Judul Utama -->
        <a-text value="VR & INDUSTRI 4.0" font="kelsonsans" align="center" position="0 1.25 0.01" color="#FFFFFF" scale="1.8 1.8 1.8" letterSpacing="1.5"></a-text>

        <!-- Main Body Text -->
        <a-text value="VR merupakan salah satu teknologi yang berkembang pada era Industri 4.0.\nTeknologi ini mendukung digitalisasi dan simulasi interaktif yang membantu proses pembelajaran, pelatihan, maupun visualisasi secara lebih efektif dan aman." font="kelsonsans" align="center" position="0 0.5 0.01" color="#CBD5E1" scale="1.1 1.1 1.1" wrap-count="60" lineHeight="60"></a-text>
      </a-entity>

      <!-- 3 HIGHLIGHT BOXES -->
      <!-- Posisinya berada di depan Main Panel (Z = -4.98) -->
      
      <!-- Box 1: Pelatihan Aman -->
      <a-entity position="-2 1.2 -4.98" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0f2a4a" width="1.9" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="1.94" height="1.44" position="0 0 -0.01" opacity="0.5"></a-plane>
          
          <a-text value="Pelatihan Aman" font="kelsonsans" align="center" position="0 0.3 0.01" color="#FFFFFF" scale="1.2 1.2 1.2"></a-text>
          <a-text value="Simulasi pekerjaan berisiko tinggi tanpa bahaya nyata bagi pekerja." font="kelsonsans" align="center" position="0 -0.15 0.01" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="25"></a-text>
        </a-plane>
      </a-entity>

      <!-- Box 2: Efisiensi Biaya -->
      <a-entity position="0 1.2 -4.98" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0f2a4a" width="1.9" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="1.94" height="1.44" position="0 0 -0.01" opacity="0.5"></a-plane>
          
          <a-text value="Efisiensi Biaya" font="kelsonsans" align="center" position="0 0.3 0.01" color="#FFFFFF" scale="1.2 1.2 1.2"></a-text>
          <a-text value="Mengurangi biaya pelatihan fisik yang mahal dan berulang." font="kelsonsans" align="center" position="0 -0.15 0.01" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="25"></a-text>
        </a-plane>
      </a-entity>

      <!-- Box 3: Visualisasi Digital -->
      <a-entity position="2 1.2 -4.98" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#0f2a4a" width="1.9" height="1.4" opacity="0.95" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="1.94" height="1.44" position="0 0 -0.01" opacity="0.5"></a-plane>
          
          <a-text value="Visualisasi Digital" font="kelsonsans" align="center" position="0 0.3 0.01" color="#FFFFFF" scale="1.2 1.2 1.2"></a-text>
          <a-text value="Mempermudah memahami sistem dan proses industri yang kompleks." font="kelsonsans" align="center" position="0 -0.15 0.01" color="#94A3B8" scale="0.9 0.9 0.9" wrap-count="25"></a-text>
        </a-plane>
      </a-entity>

      <!-- Tombol Kembali / Tutup -->
      <a-entity position="0 0.1 -4.5">
        <a-plane class="clickable" color="#1E293B" width="2" height="0.5" close-tab
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.03" height="0.53" position="0 0 -0.01"></a-plane>
          <a-text value="Kembali / Tutup" font="kelsonsans" align="center" position="0 0 0.02" color="#FFFFFF" scale="1.1 1.1 1.1"></a-text>
        </a-plane>
      </a-entity>

    </a-scene>
  </body>
</html>
