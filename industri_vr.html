<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR & Industri 4.0</title>
    <!-- Import A-Frame library -->
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    
    <style>
      /* Premium Glassmorphic Modal Overlay */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10000;
        background: rgba(2, 6, 15, 0.88);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        justify-content: center;
        align-items: center;
        flex-direction: column;
        animation: fadeIn 0.35s ease-out;
      }
      
      .modal-content {
        position: relative;
        width: 85%;
        max-width: 800px;
        background: #030812;
        border: 2px solid #0ea5e9;
        border-radius: 16px;
        box-shadow: 0 0 35px rgba(14, 165, 233, 0.4);
        overflow: hidden;
        transform: scale(0.9);
        animation: scaleUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      
      .video-container {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
        height: 0;
        overflow: hidden;
      }
      
      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
      
      .close-button {
        margin-top: 24px;
        padding: 12px 36px;
        background: linear-gradient(135deg, #0ea5e9, #0284c7);
        color: #ffffff;
        border: none;
        border-radius: 30px;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
        transition: all 0.3s ease;
      }
      
      .close-button:hover {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(14, 165, 233, 0.5);
      }
      
      .close-button:active {
        transform: translateY(1px);
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      
      @keyframes scaleUp {
        to { transform: scale(1); }
      }
    </style>

    <!-- Script untuk Komponen A-Frame Kustom -->
    <script>
      AFRAME.registerComponent('close-tab', {
        init: function () {
          this.el.addEventListener('click', () => {
            this.el.setAttribute('animation__click', 'property: scale; to: 0.95 0.95 0.95; dur: 150');
            setTimeout(() => {
              window.location.href = 'presentasi.html';
            }, 150);
          });
        }
      });

      // Partikel bercahaya biru/cyan di udara (halus dan minimalis)
      AFRAME.registerComponent('floating-particles', {
        init: function () {
          const colors = ['#0EA5E9', '#38BDF8', '#7DD3FC', '#0D9488'];
          for (let i = 0; i < 25; i++) {
            let sphere = document.createElement('a-sphere');
            let x = (Math.random() - 0.5) * 25;
            let y = Math.random() * 6 + 0.8;
            let z = (Math.random() - 0.5) * 12 - 2;
            sphere.setAttribute('position', `${x} ${y} ${z}`);
            sphere.setAttribute('radius', Math.random() * 0.02 + 0.01);
            
            let color = colors[Math.floor(Math.random() * colors.length)];
            sphere.setAttribute('material', `color: ${color}; transparent: true; opacity: 0.35; shader: flat`);
            
            let dur = Math.random() * 5000 + 4000;
            let toY = y + (Math.random() * 1.0 + 0.4);
            sphere.setAttribute('animation', `property: position; to: ${x} ${toY} ${z}; dur: ${dur}; dir: alternate; loop: true; easing: easeInOutSine`);
            this.el.appendChild(sphere);
          }
        }
      });

      // Logika pemutaran video YouTube
      AFRAME.registerComponent('play-video', {
        init: function () {
          this.el.addEventListener('click', () => {
            // Animasi click feedback
            this.el.setAttribute('animation__click', 'property: scale; to: 0.95 0.95 0.95; dur: 150');
            setTimeout(() => {
              this.el.setAttribute('animation__click', 'property: scale; to: 1 1 1; dur: 150');
            }, 150);

            // Deteksi jika berada di mode VR Headset
            const sceneEl = this.el.sceneEl;
            if (sceneEl.is('vr-mode')) {
              window.open('https://www.youtube.com/watch?v=GZHTrD3tMDM', '_blank');
            } else {
              const modal = document.getElementById('video-modal');
              const iframe = document.getElementById('video-iframe');
              iframe.src = 'https://www.youtube.com/embed/GZHTrD3tMDM?autoplay=1';
              modal.style.display = 'flex';
            }
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
      
      <a-assets>
        <img id="yt-thumb" src="img/industri_yt_thumb.jpg">
      </a-assets>

      <!-- Camera -->
      <a-entity camera look-controls position="0 1.6 0">
        <a-entity cursor="fuse: true; fuseTimeout: 2000"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.015; radiusOuter: 0.018"
                  material="color: #38BDF8; shader: flat; opacity: 0.8"
                  raycaster="objects: .clickable"
                  animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2000; from: 1 1 1; to: 0.1 0.1 0.1"
                  animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 300; to: 1 1 1"
                  animation__click="property: scale; startEvents: click; easing: easeOutCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
        </a-entity>
      </a-entity>

      <!-- Lingkungan: Clean Sci-Fi Room -->
      <a-sky color="#020813"></a-sky>
      <a-plane color="#01040a" rotation="-90 0 0" width="100" height="100" material="shader: flat"></a-plane>
      <a-plane position="0 0.01 0" rotation="-90 0 0" width="100" height="100"
               material="color: #0b223d; wireframe: true; transparent: true; opacity: 0.25; shader: flat"></a-plane>
      
      <!-- Floating Tech Particles -->
      <a-entity floating-particles></a-entity>
      
      <!-- Dekorasi: Rotating Torus Rings (Sangat Halus) -->
      <a-entity position="0 2.5 -8" animation="property: rotation; to: 360 360 0; loop: true; dur: 50000; easing: linear">
        <a-torus radius="6" radius-tubular="0.015" material="color: #0EA5E9; wireframe: true; opacity: 0.07; transparent: true"></a-torus>
        <a-torus radius="4.5" radius-tubular="0.02" rotation="90 0 0" material="color: #0ea5e9; wireframe: true; opacity: 0.05; transparent: true" animation="property: rotation; to: 90 360 0; loop: true; dur: 40000; easing: linear"></a-torus>
      </a-entity>

      <!-- HEADER / TITLE -->
      <a-entity position="0 3.6 -4.8" rotation="8 0 0" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#030b18" width="4.8" height="0.9" opacity="0.82" material="shader: flat">
          <a-plane color="#0EA5E9" width="4.84" height="0.94" position="0 0 -0.01" opacity="0.3" material="shader: flat"></a-plane>
        </a-plane>
        <a-text value="VR & INDUSTRI 4.0" font="kelsonsans" align="center" position="0 0.18 0.01" color="#FFFFFF" width="4.5" wrap-count="20" letterSpacing="2"></a-text>
        <a-text value="Digitalisasi dan Simulasi Interaktif Industri Modern" font="kelsonsans" align="center" position="0 -0.18 0.01" color="#0EA5E9" width="4.5" wrap-count="36"></a-text>
      </a-entity>

      <!-- 4 HIGHLIGHT CARDS (Widely Spaced Curved Arc Layout) -->
      
      <!-- Card 1: Pelatihan Aman (Sudut -40 derajat) -->
      <a-entity position="-3.34 1.7 -3.98" rotation="0 40 0" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; easing: easeOutBack">
        <a-plane color="#060f1e" width="2.0" height="1.6" opacity="0.85" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.04" height="1.64" position="0 0 -0.01" opacity="0.3" material="shader: flat"></a-plane>
          
          <!-- Modern Tech Badge -->
          <a-plane color="#0ea5e9" width="0.4" height="0.2" position="0 0.65 0.01" opacity="0.8" material="shader: flat"></a-plane>
          <a-text value="01" font="kelsonsans" align="center" position="0 0.65 0.02" color="#FFFFFF" width="1.2" wrap-count="10"></a-text>
          
          <!-- Title -->
          <a-text value="Pelatihan Aman" font="kelsonsans" align="center" position="0 0.38 0.02" color="#FFFFFF" width="1.8" wrap-count="18"></a-text>
          
          <!-- Thin divider -->
          <a-plane color="#0EA5E9" width="1.6" height="0.006" position="0 0.22 0.02" opacity="0.4" material="shader: flat"></a-plane>
          
          <!-- Body text -->
          <a-text value="Simulasi pekerjaan risiko tinggi tanpa bahaya nyata, meningkatkan kesiapan pekerja secara maksimal." font="kelsonsans" align="center" position="0 -0.22 0.02" color="#94A3B8" width="1.8" wrap-count="24" lineHeight="50"></a-text>
        </a-plane>
      </a-entity>

      <!-- Card 2: Efisiensi Biaya (Sudut -13 derajat) -->
      <a-entity position="-1.17 1.7 -5.06" rotation="0 13 0" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; delay: 100; easing: easeOutBack">
        <a-plane color="#060f1e" width="2.0" height="1.6" opacity="0.85" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.04" height="1.64" position="0 0 -0.01" opacity="0.3" material="shader: flat"></a-plane>
          
          <!-- Modern Tech Badge -->
          <a-plane color="#0ea5e9" width="0.4" height="0.2" position="0 0.65 0.01" opacity="0.8" material="shader: flat"></a-plane>
          <a-text value="02" font="kelsonsans" align="center" position="0 0.65 0.02" color="#FFFFFF" width="1.2" wrap-count="10"></a-text>
          
          <!-- Title -->
          <a-text value="Efisiensi Biaya" font="kelsonsans" align="center" position="0 0.38 0.02" color="#FFFFFF" width="1.8" wrap-count="18"></a-text>
          
          <!-- Thin divider -->
          <a-plane color="#0EA5E9" width="1.6" height="0.006" position="0 0.22 0.02" opacity="0.4" material="shader: flat"></a-plane>
          
          <!-- Body text -->
          <a-text value="Mengurangi biaya pengadaan peralatan fisik berat dan menekan pengeluaran operasional secara signifikan." font="kelsonsans" align="center" position="0 -0.22 0.02" color="#94A3B8" width="1.8" wrap-count="24" lineHeight="50"></a-text>
        </a-plane>
      </a-entity>

      <!-- Card 3: Visualisasi 3D (Sudut 13 derajat) -->
      <a-entity position="1.17 1.7 -5.06" rotation="0 -13 0" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; delay: 200; easing: easeOutBack">
        <a-plane color="#060f1e" width="2.0" height="1.6" opacity="0.85" class="clickable"
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.04" height="1.64" position="0 0 -0.01" opacity="0.3" material="shader: flat"></a-plane>
          
          <!-- Modern Tech Badge -->
          <a-plane color="#0ea5e9" width="0.4" height="0.2" position="0 0.65 0.01" opacity="0.8" material="shader: flat"></a-plane>
          <a-text value="03" font="kelsonsans" align="center" position="0 0.65 0.02" color="#FFFFFF" width="1.2" wrap-count="10"></a-text>
          
          <!-- Title -->
          <a-text value="Visualisasi 3D" font="kelsonsans" align="center" position="0 0.38 0.02" color="#FFFFFF" width="1.8" wrap-count="18"></a-text>
          
          <!-- Thin divider -->
          <a-plane color="#0EA5E9" width="1.6" height="0.006" position="0 0.22 0.02" opacity="0.4" material="shader: flat"></a-plane>
          
          <!-- Body text -->
          <a-text value="Mempermudah pemahaman alur kerja dan rancang bangun mekanis kompleks melalui replika digital interaktif." font="kelsonsans" align="center" position="0 -0.22 0.02" color="#94A3B8" width="1.8" wrap-count="24" lineHeight="50"></a-text>
        </a-plane>
      </a-entity>

      <!-- Card 4: Video Simulasi (Sudut 40 derajat) -->
      <a-entity position="3.34 1.7 -3.98" rotation="0 -40 0" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; delay: 300; easing: easeOutBack">
        <a-plane color="#060f1e" width="2.0" height="1.6" opacity="0.85" class="clickable" play-video
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="2.04" height="1.64" position="0 0 -0.01" opacity="0.3" material="shader: flat"></a-plane>
          
          <!-- Thumbnail Image -->
          <a-image src="#yt-thumb" width="1.8" height="1.0" position="0 0.22 0.01"></a-image>
          
          <!-- Circular Play Button Overlay -->
          <a-entity position="0 0.22 0.02">
            <a-circle radius="0.14" color="#EF4444" material="shader: flat; opacity: 0.95"></a-circle>
            <a-cone radius-bottom="0.05" height="0.08" rotation="0 0 -90" position="0.018 0 0.01" color="#FFFFFF" material="shader: flat"></a-cone>
          </a-entity>
          
          <!-- Text -->
          <a-text value="Video Simulasi" font="kelsonsans" align="center" position="0 -0.42 0.02" color="#FFFFFF" width="1.8" wrap-count="18"></a-text>
          <a-text value="Tatap untuk Memutar" font="kelsonsans" align="center" position="0 -0.58 0.02" color="#0EA5E9" width="1.8" wrap-count="24"></a-text>
        </a-plane>
      </a-entity>

      <!-- TOMBOL KEMBALI -->
      <a-entity position="0 0.2 -2.5" scale="0.8 0.8 0.8" animation="property: scale; to: 1 1 1; dur: 600; delay: 400; easing: easeOutBack">
        <a-plane class="clickable" color="#060f1e" width="1.6" height="0.45" close-tab
                 animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
                 animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-plane color="#0EA5E9" width="1.63" height="0.48" position="0 0 -0.01" opacity="0.4" material="shader: flat"></a-plane>
          <a-text value="KEMBALI" font="kelsonsans" align="center" position="0 0 0.02" color="#FFFFFF" width="1.4" wrap-count="12"></a-text>
        </a-plane>
      </a-entity>

    </a-scene>

    <!-- Modal Video YouTube (HTML/CSS) -->
    <div id="video-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="video-container">
          <iframe id="video-iframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      </div>
      <button id="close-video-btn" class="close-button">TUTUP VIDEO</button>
    </div>

    <!-- Script to handle modal close -->
    <script>
      document.getElementById('close-video-btn').addEventListener('click', function() {
        const modal = document.getElementById('video-modal');
        const iframe = document.getElementById('video-iframe');
        iframe.src = ''; // Menghentikan pemutaran video
        modal.style.display = 'none';
      });
    </script>
  </body>
</html>
