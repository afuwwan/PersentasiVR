<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentasi Workshop VR</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>

  <script>
    // Detect low-end / mobile device
    window.isLowEndDevice = AFRAME.utils.device.isMobile() || 
                           (navigator.hardwareConcurrency && navigator.hardwareConcurrency <= 4) ||
                           /perf=low/i.test(window.location.search);

    AFRAME.registerComponent('low-end-optimize', {
      init: function () {
        var sceneEl = this.el;
        var isLow = window.isLowEndDevice;
        var maxRatio = isLow ? 1.0 : 1.35;
        
        sceneEl.setAttribute('renderer', {
          antialias: !isLow,
          precision: isLow ? 'medium' : 'high',
          powerPreference: 'high-performance',
          logarithmicDepthBuffer: false
        });

        var applyPixelRatio = () => {
          if (sceneEl.renderer) {
            sceneEl.renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxRatio));
          }
        };
        if (sceneEl.renderer) { applyPixelRatio(); }
        else { sceneEl.addEventListener('render-target-loaded', applyPixelRatio); }
      }
    });

    // =====================================================
    // COMPONENT: topic-stop
    // Opens detail page in SAME TAB (no popup blocker issues, saves memory)
    // Saves step progress to localStorage for resume
    // =====================================================
    AFRAME.registerComponent('topic-stop', {
      schema: {
        url:       { type: 'string' },
        target:    { type: 'selector' },
        nextZ:     { type: 'number' },
        stepIndex: { type: 'number' }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          // Save progress so tour-progress restores position on return
          if (this.data.stepIndex) {
            localStorage.setItem('vr_visited_step', this.data.stepIndex);
          }

          // Walk camera forward on the trail
          var rig = document.getElementById('prs-camera-rig');
          rig.setAttribute('animation__walk', {
            property: 'position',
            to: '0 1 ' + this.data.nextZ,
            dur: 3500,
            easing: 'easeInOutSine'
          });

          // Dim this sign to mark it visited
          this.el.setAttribute('color', '#1e293b');
          this.el.removeAttribute('animation__mouseenter');
          this.el.removeAttribute('animation__mouseleave');
          this.el.setAttribute('scale', '1 1 1');

          // Open detail page in the same tab at the midpoint of the walk
          // This is 100% immune to popup blockers and saves system memory
          if (this.data.url) {
            setTimeout(() => {
              window.location.href = this.data.url;
            }, 1750);
          }
        });
      }
    });

    // =====================================================
    // COMPONENT: open-link
    // Final stop — opens VR Tour in new tab
    // =====================================================
    AFRAME.registerComponent('open-link', {
      schema: { url: { type: 'string', default: '' } },
      init: function () {
        this.el.addEventListener('click', () => {
          if (this.data.url) {
            var a = document.createElement('a');
            a.href = this.data.url;
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
          }
        });
      }
    });

    // =====================================================
    // COMPONENT: remove-after
    // Removes an element from DOM after a delay (fixes opacity ghosting)
    // =====================================================
    AFRAME.registerComponent('remove-after', {
      schema: { type: 'number', default: 6000 },
      init: function () {
        setTimeout(() => {
          if (this.el && this.el.parentNode) {
            this.el.parentNode.removeChild(this.el);
          }
        }, this.data);
      }
    });

    // =====================================================
    // COMPONENT: tour-progress
    // Reads localStorage and restores camera position + sign states
    // so user lands back where they left off after closing a detail tab
    // =====================================================
    AFRAME.registerComponent('tour-progress', {
      init: function () {
        var visited = parseInt(localStorage.getItem('vr_visited_step')) || 0;

        function dimSign(id) {
          var el = document.getElementById(id);
          if (el) {
            el.setAttribute('color', '#1e293b');
            el.removeAttribute('animation__mouseenter');
            el.removeAttribute('animation__mouseleave');
            el.setAttribute('scale', '1 1 1');
          }
        }

        var zPos = 0;

        if (visited >= 1) {
          document.getElementById('prs-step2').setAttribute('visible', 'true');
          document.getElementById('prs-step2').classList.add('clickable');
          dimSign('prs-step1');
          zPos = -14;
        }
        if (visited >= 2) {
          document.getElementById('prs-step3').setAttribute('visible', 'true');
          document.getElementById('prs-step3').classList.add('clickable');
          dimSign('prs-step2');
          zPos = -22;
        }
        if (visited >= 3) {
          document.getElementById('prs-step4').setAttribute('visible', 'true');
          document.getElementById('prs-step4').classList.add('clickable');
          dimSign('prs-step3');
          zPos = -30;
        }
        if (visited >= 4) {
          document.getElementById('prs-step5').setAttribute('visible', 'true');
          document.getElementById('prs-step5').classList.add('clickable');
          dimSign('prs-step4');
          zPos = -38;
        }
        if (visited >= 5) {
          document.getElementById('prs-step6').setAttribute('visible', 'true');
          document.getElementById('prs-step6').classList.add('clickable');
          dimSign('prs-step5');
          zPos = -46;
        }

        if (visited > 0) {
          document.getElementById('prs-camera-rig').setAttribute('position', '0 1 ' + zPos);
        }
      }
    });

    // =====================================================
    // COMPONENT: fireflies
    // =====================================================
    AFRAME.registerComponent('fireflies', {
      init: function () {
        var isLow = window.isLowEndDevice;
        var count = isLow ? 20 : 75;
        for (var i = 0; i < count; i++) {
          var fly = document.createElement('a-sphere');
          fly.setAttribute('id', 'firefly-' + i);
          var x = (Math.random() - 0.5) * 20;
          var y = Math.random() * 2.5 + 0.5;
          var z = -Math.random() * 55;
          fly.setAttribute('position', x + ' ' + y + ' ' + z);
          fly.setAttribute('radius', Math.random() * 0.02 + 0.015);
          fly.setAttribute('material', 'color: #a3e635; shader: flat; transparent: true; opacity: 0.8');
          var dur = Math.random() * 3000 + 2000;
          fly.setAttribute('animation__move', 'property: position; to: ' + x + ' ' + (y + Math.random() * 0.5) + ' ' + z + '; dur: ' + dur + '; dir: alternate; loop: true; easing: easeInOutSine');
          fly.setAttribute('animation__glow', 'property: material.opacity; from: 0.2; to: 0.9; dur: ' + (dur / 2) + '; dir: alternate; loop: true; easing: easeInOutSine');
          this.el.appendChild(fly);
        }
      }
    });

    // =====================================================
    // COMPONENT: park-trees
    // Procedural trees that leave the centre path clear
    // =====================================================
    AFRAME.registerComponent('park-trees', {
      init: function () {
        var isLow = window.isLowEndDevice;
        var count = isLow ? 40 : 150;
        for (var i = 0; i < count; i++) {
          var x = (Math.random() - 0.5) * 100;
          var z = (Math.random() - 0.5) * 100;

          // Keep path clear
          if (x > -4.5 && x < 4.5) {
            x = x >= 0 ? x + 4.5 : x - 4.5;
          }
          if (z > 8) continue;

          var tree = document.createElement('a-entity');
          tree.setAttribute('id', 'custom-tree-' + i);
          tree.setAttribute('position', x + ' 0 ' + z);
          var s = Math.random() * 2 + 1.5;
          tree.setAttribute('scale', s + ' ' + s + ' ' + s);

          var trunk = document.createElement('a-cylinder');
          trunk.setAttribute('id', 'tree-trunk-' + i);
          trunk.setAttribute('color', '#3e2723');
          trunk.setAttribute('radius', '0.15');
          trunk.setAttribute('height', '1.5');
          trunk.setAttribute('position', '0 0.75 0');
          trunk.setAttribute('material', 'roughness: 1.0');
          tree.appendChild(trunk);

          var greenColor = Math.random() > 0.5 ? '#1f3d14' : '#274a1a';

          var leaves1 = document.createElement('a-cone');
          leaves1.setAttribute('id', 'tree-leaves1-' + i);
          leaves1.setAttribute('color', greenColor);
          leaves1.setAttribute('radius-bottom', '1.2');
          leaves1.setAttribute('height', '3');
          leaves1.setAttribute('position', '0 2.5 0');
          tree.appendChild(leaves1);

          var leaves2 = document.createElement('a-cone');
          leaves2.setAttribute('id', 'tree-leaves2-' + i);
          leaves2.setAttribute('color', greenColor);
          leaves2.setAttribute('radius-bottom', '0.9');
          leaves2.setAttribute('height', '2.5');
          leaves2.setAttribute('position', '0 3.8 0');
          tree.appendChild(leaves2);

          this.el.appendChild(tree);
        }
      }
    });
  </script>
</head>

<body>
  <a-scene renderer="antialias: false; precision: medium; powerPreference: high-performance" low-end-optimize id="prs-main-scene" cursor="rayOrigin: mouse" raycaster="objects: .clickable" tour-progress>

    <!-- ==================== CAMERA ==================== -->
    <a-entity id="prs-camera-rig" rotation="0 0 0" position="0 1 0">
      <a-entity id="prs-main-camera" camera look-controls position="0 1.6 0">
        <a-entity id="prs-camera-cursor" cursor="fuse: true; fuseTimeout: 2000" position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.014"
          material="color: #0EA5E9; shader: flat; opacity: 0.8" raycaster="objects: .clickable"
          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2000; from: 1 1 1; to: 0.1 0.1 0.1"
          animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 300; to: 1 1 1"
          animation__click="property: scale; startEvents: click; easing: easeOutCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- ==================== ENVIRONMENT ==================== -->
    <a-entity id="prs-fireflies-system" fireflies></a-entity>
    <a-entity id="prs-forest-environment" environment="
        preset: forest;
        skyType: atmosphere;
        lighting: point;
        groundColor: #2d4a1e;
        groundColor2: #1a3310;
        dressingColor: #1a4d1a;
        ground: hills;
        groundYScale: 0.15;
        flatShading: false;
        fog: 0.65;
        dressing: none
      "></a-entity>
    <a-entity id="prs-custom-trees-system" park-trees></a-entity>

    <!-- ==================== DIRT PATH ==================== -->
    <a-box id="prs-dirt-path-main" scale="2.05477 1 1" color="#4a3b2c" width="1.4" height="0.06" depth="58" position="0 0.25 -24"
      material="roughness: 1.0; metalness: 0.0">
    </a-box>
    <a-box id="prs-dirt-path-edge-left" color="#31261d" width="0.06" height="0.07" depth="58" position="-1.43146 0.26 -24"
      material="shader: flat"></a-box>
    <a-box id="prs-dirt-path-edge-right" color="#31261d" width="0.06" height="0.07" depth="58" position="1.48586 0.26 -24"
      material="shader: flat"></a-box>

    <!-- ==================== SIGNS (Holographic Trail Boards) ==================== -->

    <!-- STOP 1 -->
    <a-entity id="prs-sign1-wrapper" position="0 2.2 -6" rotation="0 0 0">
      <a-box id="prs-sign1-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="prs-sign1-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="prs-sign1-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="prs-sign1-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>
      <a-entity id="prs-sign1-screen-grp" animation="property: position; to: 0 0.05 0; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        <a-plane id="prs-sign1-glass"  color="#020617" width="3.15" height="1.35" position="0 0 -0.02"  material="transparent: true; opacity: 0.4"></a-plane>
        <a-plane id="prs-sign1-border" color="#0EA5E9" width="3.06" height="1.26" position="0 0 -0.012" material="shader: flat; opacity: 0.85"></a-plane>
        <a-plane id="prs-step1" class="clickable" color="#0f172a" width="3" height="1.2"
          topic-stop="url: apa_itu_vr.html; target: #prs-step2; nextZ: -14; stepIndex: 1"
          material="shader: flat; transparent: true; opacity: 0.95"
          animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
          animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-text id="prs-sign1-num"   value="01"                      font="kelsonsans" align="center" position="-1.1 0 0.01"   color="#0EA5E9" scale="2.2 2.2 2.2" opacity="0.15"></a-text>
          <a-text id="prs-sign1-title" value="Apa itu VR?"             font="kelsonsans" align="left"   position="-0.75 0.2 0.01" color="#FFFFFF" scale="1.2 1.2 1.2" width="3.5"></a-text>
          <a-text id="prs-sign1-sub"   value="Definisi dan Konsep Dasar" font="kelsonsans" align="left" position="-0.75 -0.18 0.01" color="#94A3B8" scale="0.8 0.8 0.8" width="4"></a-text>
        </a-plane>
      </a-entity>
    </a-entity>

    <!-- STOP 2 -->
    <a-entity id="prs-sign2-wrapper" position="2.2 2.2 -16" rotation="0 -18 0">
      <a-box id="prs-sign2-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="prs-sign2-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="prs-sign2-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="prs-sign2-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>
      <a-entity id="prs-sign2-screen-grp" animation="property: position; to: 0 0.05 0; dur: 2300; dir: alternate; loop: true; easing: easeInOutSine">
        <a-plane id="prs-sign2-glass"  color="#020617" width="3.15" height="1.35" position="0 0 -0.02"  material="transparent: true; opacity: 0.4"></a-plane>
        <a-plane id="prs-sign2-border" color="#0EA5E9" width="3.06" height="1.26" position="0 0 -0.012" material="shader: flat; opacity: 0.85"></a-plane>
        <a-plane id="prs-step2" visible="false" color="#0f172a" width="3" height="1.2"
          topic-stop="url: konsep_dasar_vr.html; target: #prs-step3; nextZ: -22; stepIndex: 2"
          material="shader: flat; transparent: true; opacity: 0.95"
          animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
          animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-text id="prs-sign2-num"   value="02"                    font="kelsonsans" align="center" position="-1.1 0 0.01"    color="#0EA5E9" scale="2.2 2.2 2.2" opacity="0.15"></a-text>
          <a-text id="prs-sign2-title" value="Konsep Dasar VR"       font="kelsonsans" align="left"   position="-0.75 0.2 0.01"  color="#FFFFFF" scale="1.2 1.2 1.2" width="3.5"></a-text>
          <a-text id="prs-sign2-sub"   value="4 Elemen Penting VR"   font="kelsonsans" align="left"   position="-0.75 -0.18 0.01" color="#94A3B8" scale="0.8 0.8 0.8" width="4"></a-text>
        </a-plane>
      </a-entity>
    </a-entity>

    <!-- STOP 3 -->
    <a-entity id="prs-sign3-wrapper" position="-2.2 2.2 -24" rotation="0 18 0">
      <a-box id="prs-sign3-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="prs-sign3-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="prs-sign3-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="prs-sign3-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>
      <a-entity id="prs-sign3-screen-grp" animation="property: position; to: 0 0.05 0; dur: 2600; dir: alternate; loop: true; easing: easeInOutSine">
        <a-plane id="prs-sign3-glass"  color="#020617" width="3.15" height="1.35" position="0 0 -0.02"  material="transparent: true; opacity: 0.4"></a-plane>
        <a-plane id="prs-sign3-border" color="#0EA5E9" width="3.06" height="1.26" position="0 0 -0.012" material="shader: flat; opacity: 0.85"></a-plane>
        <a-plane id="prs-step3" visible="false" color="#0f172a" width="3" height="1.2"
          topic-stop="url: sejarah_vr.html; target: #prs-step4; nextZ: -30; stepIndex: 3"
          material="shader: flat; transparent: true; opacity: 0.95"
          animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
          animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-text id="prs-sign3-num"   value="03"                        font="kelsonsans" align="center" position="-1.1 0 0.01"    color="#0EA5E9" scale="2.2 2.2 2.2" opacity="0.15"></a-text>
          <a-text id="prs-sign3-title" value="Sejarah VR"                font="kelsonsans" align="left"   position="-0.75 0.2 0.01"  color="#FFFFFF" scale="1.2 1.2 1.2" width="3.5"></a-text>
          <a-text id="prs-sign3-sub"   value="Dari 1960 hingga Sekarang" font="kelsonsans" align="left"   position="-0.75 -0.18 0.01" color="#94A3B8" scale="0.8 0.8 0.8" width="4"></a-text>
        </a-plane>
      </a-entity>
    </a-entity>

    <!-- STOP 4 -->
    <a-entity id="prs-sign4-wrapper" position="2.2 2.2 -32" rotation="0 -18 0">
      <a-box id="prs-sign4-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="prs-sign4-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="prs-sign4-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="prs-sign4-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>

          material="shader: flat; transparent: true; opacity: 0.95"
          animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"

          <a-text id="prs-sign4-num"   value="04"                             font="kelsonsans" align="center" position="-1.1 0 0.01"    color="#0EA5E9" scale="2.2 2.2 2.2" opacity="0.15"></a-text>
          <a-text id="prs-sign4-title" value="VR &amp; Industri 4.0"         font="kelsonsans" align="left"   position="-0.75 0.2 0.01"  color="#FFFFFF" scale="1.2 1.2 1.2" width="3.5"></a-text>
          <a-text id="prs-sign4-sub"   value="Keterkaitan dan Peran Strategis" font="kelsonsans" align="left" position="-0.75 -0.18 0.01" color="#94A3B8" scale="0.8 0.8 0.8" width="4"></a-text>
        </a-plane>
      </a-entity>
    </a-entity>

    <!-- STOP 5 -->
    <a-entity id="prs-sign5-wrapper" position="-2.2 2.2 -40" rotation="0 18 0">
      <a-box id="prs-sign5-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="prs-sign5-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="prs-sign5-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="prs-sign5-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>
      <a-entity id="prs-sign5-screen-grp" animation="property: position; to: 0 0.05 0; dur: 2400; dir: alternate; loop: true; easing: easeInOutSine">
        <a-plane id="prs-sign5-glass"  color="#020617" width="3.15" height="1.35" position="0 0 -0.02"  material="transparent: true; opacity: 0.4"></a-plane>
        <a-plane id="prs-sign5-border" color="#0EA5E9" width="3.06" height="1.26" position="0 0 -0.012" material="shader: flat; opacity: 0.85"></a-plane>
        <a-plane id="prs-step5" visible="false" color="#0f172a" width="3" height="1.2"
          topic-stop="url: manfaat_vr.html; target: #prs-step6; nextZ: -46; stepIndex: 5"
