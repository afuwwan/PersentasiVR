<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentasi Workshop VR</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>

  <script>
    // =====================================================
    // GLOBAL: setSkyColor
    // =====================================================
    function setSkyColor(color) {
      var sky = document.getElementById('main-sky');
      if (sky) sky.setAttribute('color', color);
    }

    // =====================================================
    // COMPONENT: topic-stop
    // Walk forward on trail then teleport to zone
    // =====================================================
    AFRAME.registerComponent('topic-stop', {
      schema: {
        url:       { type: 'string' },
        target:    { type: 'selector' },
        nextZ:     { type: 'number' },
        stepIndex: { type: 'number' },
        zoneX:     { type: 'number', default: 0 }
      },
      init: function () {
        this.el.addEventListener('click', () => {
          if (this.data.stepIndex) {
            localStorage.setItem('vr_visited_step', this.data.stepIndex);
          }

          var rig   = document.getElementById('camera-rig');
          var zoneX = this.data.zoneX;

          // Walk forward on trail
          rig.setAttribute('animation__walk', {
            property: 'position',
            to: '0 1 ' + this.data.nextZ,
            dur: 2000,
            easing: 'easeInOutSine'
          });

          // Dim this sign
          this.el.setAttribute('color', '#1e293b');
          this.el.removeAttribute('animation__mouseenter');
          this.el.removeAttribute('animation__mouseleave');
          this.el.setAttribute('scale', '1 1 1');

          var skyColors = {
            150:  '#000814',
            300:  '#050818',
            450:  '#080608',
            600:  '#030a14',
            750:  '#020b12'
          };

          // After walk completes, teleport to zone
          setTimeout(() => {
            rig.removeAttribute('animation__walk');
            rig.setAttribute('position', zoneX + ' 1 -5');
            setSkyColor(skyColors[zoneX] || '#000814');
          }, 2000);
        });
      }
    });

    // =====================================================
    // COMPONENT: go-back
    // Return camera to trail position, reveal next sign
    // =====================================================
    AFRAME.registerComponent('go-back', {
      schema: { stepIndex: { type: 'number', default: 1 } },
      init: function () {
        this.el.addEventListener('click', () => {
          var zMap  = { 1: -14, 2: -22, 3: -30, 4: -38, 5: -46 };
          var trailZ = zMap[this.data.stepIndex] || 0;

          // Teleport back to trail
          var rig = document.getElementById('camera-rig');
          rig.setAttribute('position', '0 1 ' + trailZ);

          // Reveal next sign
          var nextStep = this.data.stepIndex + 1;
          var nextId   = 'step' + nextStep;
          var nextEl   = document.getElementById(nextId);
          if (nextEl) {
            nextEl.setAttribute('visible', 'true');
            nextEl.classList.add('clickable');
          }

          // Restore forest sky
          setSkyColor('#1a2e1a');
        });
      }
    });

    // =====================================================
    // COMPONENT: open-link
    // =====================================================
    AFRAME.registerComponent('open-link', {
      schema: { url: { type: 'string', default: '' } },
      init: function () {
        this.el.addEventListener('click', () => {
          if (this.data.url) window.location.href = this.data.url;
        });
      }
    });

    // =====================================================
    // COMPONENT: remove-after
    // =====================================================
    AFRAME.registerComponent('remove-after', {
      schema: { type: 'number', default: 6000 },
      init: function () {
        setTimeout(() => {
          if (this.el && this.el.parentNode) {
            this.el.parentNode.removeChild(this.el);
          }
        }, this.data);
      }
    });

    // =====================================================
    // COMPONENT: tour-progress
    // Restore camera + sign state from localStorage
    // =====================================================
    AFRAME.registerComponent('tour-progress', {
      init: function () {
        var visited = parseInt(localStorage.getItem('vr_visited_step')) || 0;

        function dimSign(id) {
          var el = document.getElementById(id);
          if (el) {
            el.setAttribute('color', '#1e293b');
            el.removeAttribute('animation__mouseenter');
            el.removeAttribute('animation__mouseleave');
            el.setAttribute('scale', '1 1 1');
          }
        }

        var zPos = 0;

        if (visited >= 1) {
          document.getElementById('step2').setAttribute('visible', 'true');
          document.getElementById('step2').classList.add('clickable');
          dimSign('step1');
          zPos = -14;
        }
        if (visited >= 2) {
          document.getElementById('step3').setAttribute('visible', 'true');
          document.getElementById('step3').classList.add('clickable');
          dimSign('step2');
          zPos = -22;
        }
        if (visited >= 3) {
          document.getElementById('step4').setAttribute('visible', 'true');
          document.getElementById('step4').classList.add('clickable');
          dimSign('step3');
          zPos = -30;
        }
        if (visited >= 4) {
          document.getElementById('step5').setAttribute('visible', 'true');
          document.getElementById('step5').classList.add('clickable');
          dimSign('step4');
          zPos = -38;
        }
        if (visited >= 5) {
          document.getElementById('step6').setAttribute('visible', 'true');
          document.getElementById('step6').classList.add('clickable');
          dimSign('step5');
          zPos = -46;
        }

        if (visited > 0) {
          document.getElementById('camera-rig').setAttribute('position', '0 1 ' + zPos);
        }

        // Always start with forest sky
        setSkyColor('#1a2e1a');
      }
    });

    // =====================================================
    // COMPONENT: fireflies
    // =====================================================
    AFRAME.registerComponent('fireflies', {
      init: function () {
        for (var i = 0; i < 75; i++) {
          var fly = document.createElement('a-sphere');
          fly.setAttribute('id', 'firefly-' + i);
          var x = (Math.random() - 0.5) * 20;
          var y = Math.random() * 2.5 + 0.5;
          var z = -Math.random() * 55;

          fly.setAttribute('position', x + ' ' + y + ' ' + z);
          fly.setAttribute('radius', Math.random() * 0.02 + 0.015);
          fly.setAttribute('material', 'color: #a3e635; shader: flat; transparent: true; opacity: 0.8');

          var dur = Math.random() * 3000 + 2000;
          fly.setAttribute('animation__move', 'property: position; to: ' + x + ' ' + (y + Math.random() * 0.5) + ' ' + z + '; dur: ' + dur + '; dir: alternate; loop: true; easing: easeInOutSine');
          fly.setAttribute('animation__glow', 'property: material.opacity; from: 0.2; to: 0.9; dur: ' + (dur / 2) + '; dir: alternate; loop: true; easing: easeInOutSine');

          this.el.appendChild(fly);
        }
      }
    });

    // =====================================================
    // COMPONENT: park-trees
    // =====================================================
    AFRAME.registerComponent('park-trees', {
      init: function () {
        for (var i = 0; i < 150; i++) {
          var x = (Math.random() - 0.5) * 100;
          var z = (Math.random() - 0.5) * 100;

          if (x > -4.5 && x < 4.5) {
            x = x >= 0 ? x + 4.5 : x - 4.5;
          }
          if (z > 8) continue;

          var tree = document.createElement('a-entity');
          tree.setAttribute('id', 'custom-tree-' + i);
          tree.setAttribute('position', x + ' 0 ' + z);

          var s = Math.random() * 2 + 1.5;
          tree.setAttribute('scale', s + ' ' + s + ' ' + s);

          var trunk = document.createElement('a-cylinder');
          trunk.setAttribute('id', 'tree-trunk-' + i);
          trunk.setAttribute('color', '#3e2723');
          trunk.setAttribute('radius', '0.15');
          trunk.setAttribute('height', '1.5');
          trunk.setAttribute('position', '0 0.75 0');
          trunk.setAttribute('material', 'roughness: 1.0');
          tree.appendChild(trunk);

          var greenColor = Math.random() > 0.5 ? '#1f3d14' : '#274a1a';

          var leaves1 = document.createElement('a-cone');
          leaves1.setAttribute('id', 'tree-leaves1-' + i);
          leaves1.setAttribute('color', greenColor);
          leaves1.setAttribute('radius-bottom', '1.2');
          leaves1.setAttribute('height', '3');
          leaves1.setAttribute('position', '0 2.5 0');
          tree.appendChild(leaves1);

          var leaves2 = document.createElement('a-cone');
          leaves2.setAttribute('id', 'tree-leaves2-' + i);
          leaves2.setAttribute('color', greenColor);
          leaves2.setAttribute('radius-bottom', '0.9');
          leaves2.setAttribute('height', '2.5');
          leaves2.setAttribute('position', '0 3.8 0');
          tree.appendChild(leaves2);

          this.el.appendChild(tree);
        }
      }
    });

    // =====================================================
    // COMPONENT: react-ball (Zone 1)
    // =====================================================
    AFRAME.registerComponent('react-ball', {
      schema: { originalColor: { type: 'color', default: '#00FFFF' } },
      init: function () {
        var el   = this.el;
        var data = this.data;
        var colors    = ['#FF6B6B', '#38BDF8', '#A78BFA', '#34D399', '#FBBF24', '#F472B6', '#00FFFF', '#818CF8'];
        var originalY = parseFloat(el.getAttribute('position').y);
        var bouncing  = false;

        el.addEventListener('mouseenter', function () {
          if (bouncing) return;
          bouncing = true;

          var newColor = colors[Math.floor(Math.random() * colors.length)];
          el.setAttribute('material', 'color', newColor);

          el.setAttribute('animation__bounce-up', {
            property: 'position.y',
            to: originalY + 1.2,
            dur: 350,
            easing: 'easeOutQuad'
          });
          el.setAttribute('animation__squash', {
            property: 'scale',
            to: '1.3 0.7 1.3',
            dur: 150,
            easing: 'easeOutQuad'
          });

          var label = el.querySelector('.react-label');
          if (label) {
            label.setAttribute('visible', 'true');
            label.setAttribute('animation__fadein', {
              property: 'scale',
              from: '0 0 0',
              to: '1 1 1',
              dur: 250,
              easing: 'easeOutBack'
            });
          }

          setTimeout(function () {
            el.setAttribute('animation__bounce-down', {
              property: 'position.y',
              to: originalY,
              dur: 500,
              easing: 'easeInQuad'
            });
            el.setAttribute('animation__unsquash', {
              property: 'scale',
              to: '1 1 1',
              dur: 300,
              easing: 'easeOutBack'
            });
          }, 350);

          setTimeout(function () {
            if (label) label.setAttribute('visible', 'false');
            el.setAttribute('material', 'color', data.originalColor);
            bouncing = false;
          }, 1200);
        });
      }
    });

    // =====================================================
    // COMPONENT: pulse-react (Zone 2)
    // =====================================================
    AFRAME.registerComponent('pulse-react', {
      init: function () {
        var el     = this.el;
        var pulsing = false;
        var colors = ['#FF6B6B', '#FBBF24', '#34D399', '#A78BFA', '#F472B6', '#38BDF8'];

        el.addEventListener('mouseenter', function () {
          if (pulsing) return;
          pulsing = true;

          var newColor = colors[Math.floor(Math.random() * colors.length)];
          el.setAttribute('material', 'color', newColor);

          el.removeAttribute('animation__pulse');
          el.setAttribute('scale', '1 1 1');
          setTimeout(function () {
            el.setAttribute('animation__pulse', {
              property: 'scale',
              from: '1 1 1',
              to: '1.4 1.4 1.4',
              dur: 350,
              dir: 'alternate',
              loop: 4,
              easing: 'easeOutSine'
            });
          }, 20);

          var label = el.querySelector('.pulse-label');
          if (label) label.setAttribute('visible', 'true');

          setTimeout(function () {
            el.removeAttribute('animation__pulse');
            el.setAttribute('scale', '1 1 1');
            el.setAttribute('material', 'color', '#38BDF8');
            if (label) label.setAttribute('visible', 'false');
            pulsing = false;
          }, 1800);
        });
      }
    });

    // =====================================================
    // COMPONENT: gaze-spin (Zone 2)
    // =====================================================
    AFRAME.registerComponent('gaze-spin', {
      init: function () {
        var el    = this.el;
        this.speed = 0.3;

        el.addEventListener('mouseenter', () => {
          this.speed = 4.0;
          var label = el.parentNode.querySelector('.spin-label');
          if (label) label.setAttribute('visible', 'true');
        });
        el.addEventListener('mouseleave', () => {
          this.speed = 0.3;
          var label = el.parentNode.querySelector('.spin-label');
          if (label) label.setAttribute('visible', 'false');
        });
      },
      tick: function (time, delta) {
        var rot = this.el.getAttribute('rotation');
        var s   = this.speed * (delta / 16);
        this.el.setAttribute('rotation', {
          x: rot.x + s,
          y: rot.y + s * 2,
          z: rot.z + s * 0.5
        });
      }
    });

    // =====================================================
    // COMPONENT: grid-drawer (Zone 1)
    // =====================================================
    AFRAME.registerComponent('grid-drawer', {
      init: function () {
        var canvas = document.getElementById('grid-texture');
        var ctx    = canvas.getContext('2d');
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, 128, 128);
        ctx.strokeStyle = '#00FFFF';
        ctx.lineWidth   = 1;
        for (var i = 0; i <= 128; i += 32) {
          ctx.beginPath(); ctx.moveTo(i, 0);   ctx.lineTo(i, 128); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(0, i);   ctx.lineTo(128, i); ctx.stroke();
        }
        this.el.addEventListener('materialtextureloaded', () => {
          var mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map) {
            mesh.material.map.needsUpdate = true;
          }
        });
      }
    });

    // =====================================================
    // COMPONENT: floating-particles (Zones 2, 5)
    // =====================================================
    AFRAME.registerComponent('floating-particles', {
      schema: { count: { type: 'number', default: 55 } },
      init: function () {
        var colors = ['#38BDF8', '#A78BFA', '#34D399', '#FBBF24', '#F472B6'];
        for (var i = 0; i < this.data.count; i++) {
          var sphere = document.createElement('a-sphere');
          var x  = (Math.random() - 0.5) * 35;
          var y  = Math.random() * 9 + 0.5;
          var z  = (Math.random() - 0.5) * 20 - 3;
          sphere.setAttribute('position', x + ' ' + y + ' ' + z);
          sphere.setAttribute('radius', Math.random() * 0.03 + 0.01);
          var color = colors[Math.floor(Math.random() * colors.length)];
          sphere.setAttribute('material', 'color: ' + color + '; transparent: true; opacity: 0.35; shader: flat');
          var dur = Math.random() * 4000 + 3000;
          var toY = y + (Math.random() * 1.5 + 0.5);
          sphere.setAttribute('animation', 'property: position; to: ' + x + ' ' + toY + ' ' + z + '; dur: ' + dur + '; dir: alternate; loop: true; easing: easeInOutSine');
          this.el.appendChild(sphere);
        }
      }
    });
  </script>
</head>

<body>
  <a-scene id="main-scene" cursor="rayOrigin: mouse" raycaster="objects: .clickable" tour-progress>

    <!-- ==================== ASSETS ==================== -->
    <a-assets>
      <canvas id="grid-texture" width="128" height="128"></canvas>
    </a-assets>

    <!-- ==================== CAMERA RIG ==================== -->
    <a-entity id="camera-rig" position="0 1 0">
      <a-entity id="main-camera" camera look-controls wasd-controls="acceleration: 15" position="0 1.6 0">
        <a-entity id="camera-cursor" cursor="fuse: true; fuseTimeout: 2000"
          position="0 0 -1"
          geometry="primitive: ring; radiusInner: 0.008; radiusOuter: 0.014"
          material="color: #0EA5E9; shader: flat; opacity: 0.8"
          raycaster="objects: .clickable"
          animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 2000; from: 1 1 1; to: 0.1 0.1 0.1"
          animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeOutCubic; dur: 300; to: 1 1 1"
          animation__click="property: scale; startEvents: click; easing: easeOutCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
        </a-entity>
      </a-entity>
    </a-entity>

    <!-- ==================== SKY (shared, color controlled by setSkyColor) ==================== -->
    <a-sky id="main-sky" color="#1a2e1a"></a-sky>

    <!-- ==================== FOREST ENVIRONMENT (Zone 0) ==================== -->
    <a-entity id="fireflies-system" fireflies></a-entity>
    <a-entity id="forest-environment" environment="
        preset: forest;
        skyType: atmosphere;
        lighting: point;
        groundColor: #2d4a1e;
        groundColor2: #1a3310;
        dressingColor: #1a4d1a;
        ground: hills;
        groundYScale: 0.15;
        flatShading: false;
        fog: 0.65;
        dressing: none
      "></a-entity>
    <a-entity id="custom-trees-system" park-trees></a-entity>

    <!-- ==================== DIRT PATH ==================== -->
    <a-box id="dirt-path-main" scale="2.05477 1 1" color="#4a3b2c" width="1.4" height="0.06" depth="58" position="0 0.25 -24"
      material="roughness: 1.0; metalness: 0.0">
    </a-box>
    <a-box id="dirt-path-edge-left"  color="#31261d" width="0.06" height="0.07" depth="58" position="-1.43146 0.26 -24" material="shader: flat"></a-box>
    <a-box id="dirt-path-edge-right" color="#31261d" width="0.06" height="0.07" depth="58" position="1.48586 0.26 -24"  material="shader: flat"></a-box>

    <!-- ==================== ZONE 0: FOREST TRAIL SIGNS ==================== -->

    <!-- STOP 1 -->
    <a-entity id="sign1-wrapper" position="0 2.2 -6" rotation="0 0 0">
      <a-box id="sign1-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="sign1-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="sign1-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="sign1-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>
      <a-entity id="sign1-screen-grp" animation="property: position; to: 0 0.05 0; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine">
        <a-plane id="sign1-glass"  color="#020617" width="3.15" height="1.35" position="0 0 -0.02"  material="transparent: true; opacity: 0.4"></a-plane>
        <a-plane id="sign1-border" color="#0EA5E9" width="3.06" height="1.26" position="0 0 -0.012" material="shader: flat; opacity: 0.85"></a-plane>
        <a-plane id="step1" class="clickable" color="#0f172a" width="3" height="1.2"
          topic-stop="url: apa_itu_vr.html; target: #step2; nextZ: -14; stepIndex: 1; zoneX: 150"
          material="shader: flat; transparent: true; opacity: 0.95"
          animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
          animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-text id="sign1-num"   value="01" font="kelsonsans" align="center" position="-1.1 0 0.01"   color="#0EA5E9" scale="2.2 2.2 2.2" opacity="0.15"></a-text>
          <a-text id="sign1-title" value="Apa itu VR?"             font="kelsonsans" align="left" position="-0.75 0.2 0.01"  color="#FFFFFF"  scale="1.2 1.2 1.2" width="3.5"></a-text>
          <a-text id="sign1-sub"   value="Definisi dan Konsep Dasar" font="kelsonsans" align="left" position="-0.75 -0.18 0.01" color="#94A3B8" scale="0.8 0.8 0.8" width="4"></a-text>
        </a-plane>
      </a-entity>
    </a-entity>

    <!-- STOP 2 -->
    <a-entity id="sign2-wrapper" position="2.2 2.2 -16" rotation="0 -18 0">
      <a-box id="sign2-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="sign2-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="sign2-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="sign2-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>
      <a-entity id="sign2-screen-grp" animation="property: position; to: 0 0.05 0; dur: 2300; dir: alternate; loop: true; easing: easeInOutSine">
        <a-plane id="sign2-glass"  color="#020617" width="3.15" height="1.35" position="0 0 -0.02"  material="transparent: true; opacity: 0.4"></a-plane>
        <a-plane id="sign2-border" color="#0EA5E9" width="3.06" height="1.26" position="0 0 -0.012" material="shader: flat; opacity: 0.85"></a-plane>
        <a-plane id="step2" visible="false" color="#0f172a" width="3" height="1.2"
          topic-stop="url: konsep_dasar_vr.html; target: #step3; nextZ: -22; stepIndex: 2; zoneX: 300"
          material="shader: flat; transparent: true; opacity: 0.95"
          animation__mouseenter="property: scale; to: 1.05 1.05 1.05; startEvents: mouseenter; dur: 200"
          animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200">
          <a-text id="sign2-num"   value="02" font="kelsonsans" align="center" position="-1.1 0 0.01"   color="#0EA5E9" scale="2.2 2.2 2.2" opacity="0.15"></a-text>
          <a-text id="sign2-title" value="Konsep Dasar VR"    font="kelsonsans" align="left" position="-0.75 0.2 0.01"  color="#FFFFFF"  scale="1.2 1.2 1.2" width="3.5"></a-text>
          <a-text id="sign2-sub"   value="4 Elemen Penting VR" font="kelsonsans" align="left" position="-0.75 -0.18 0.01" color="#94A3B8" scale="0.8 0.8 0.8" width="4"></a-text>
        </a-plane>
      </a-entity>
    </a-entity>

    <!-- STOP 3 -->
    <a-entity id="sign3-wrapper" position="-2.2 2.2 -24" rotation="0 18 0">
      <a-box id="sign3-post-l" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="-1.7 -1.0 0" material="roughness: 1.0"></a-box>
      <a-box id="sign3-post-r" color="#2c1a14" width="0.12" height="3.5" depth="0.12" position="1.7 -1.0 0"  material="roughness: 1.0"></a-box>
      <a-box id="sign3-beam-t" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 0.8 0"   material="roughness: 1.0"></a-box>
      <a-box id="sign3-beam-b" color="#2c1a14" width="3.8" height="0.12" depth="0.12" position="0 -0.8 0"  material="roughness: 1.0"></a-box>
      <a-entity id="sign3-screen-grp" animation="property: position; to: 0 0.05 0; dur: 2600; dir: alternate; loop: true; easing: easeInOutSine">
